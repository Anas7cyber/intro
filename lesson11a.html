<!DOCTYPE html>
<html>
    <head>
        <style>
            div {
                right: 30px;
                border: 3px solid cadetblue;
            }
            div.absolute {
                position: absolute;
                left:50px;
                border: 3px solid cornflowerblue
            } 
            div.relative {
                position: relative;
                left: 100px;
                 border: 3px solid cadetblue;
            }
            div.fixed {
                position: fixed;
                right:20px;
                width: 30px;
                border: 3px solid cadetblue;
            }
            div.sticky {
                position: sticky;
                top: 1px;
                left:20px;
                width:100px;
                 border: 3px solid cadetblue;
            }
        </style>
    </head>
    <body>
        <h2>POSITIONING</h2>
        <div>
            Div with no position property
        </div>
        <div class="sticky">
            Div with sticky position
        </div>
        <div class="relative">
            This element has positon: relative;
        <div class="absolute">
            Absolute clas DIV
        </div>
         </div>
         <div class="fixed">
            Div with fixed position property
         </div>
